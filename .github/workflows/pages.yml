name: Deploy PWA

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 输入 DEPLOY 确认发布当前 main
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Confirm release
        if: inputs.confirm != 'DEPLOY'
        run: exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run quality

      - name: Build Pages artifact
        env:
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_EXPECTED_ORIGIN: https://komochi007.github.io
          VITE_SERVICE_WORKER_PATH: /Tradgio/sw.js
          VITE_BASE_PATH: /Tradgio/
          VITE_UPDATE_RISK: normal
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
